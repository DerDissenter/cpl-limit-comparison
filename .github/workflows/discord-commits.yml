name: Discord Commit Notifications

on: push

jobs:
  notify-discord:
    runs-on: ubuntu-latest

    steps:
      - name: Send Discord notification
        run: |
          curl -H "Content-Type: application/json" \
            -X POST \
            -d "{\"content\":\"📦 New commit pushed to **${{ github.repository }}** on branch **${{ github.ref_name }}** by **${{ github.actor }}**\n\n**Commit:** ${{ github.event.head_commit.message }}\n${{ github.event.head_commit.url }}\"}" \
            "${{ secrets.DISCORD_WEBHOOK_URL }}"
