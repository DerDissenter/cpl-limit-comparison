name: Community Season Export

on:
  workflow_dispatch:
  schedule:
    - cron: "15 1 * * *"

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Export season snapshot
        run: node scripts/export-community-season.mjs --only-season-end --skip-existing

      - name: Commit snapshot
        run: |
          if [ -z "$(git status --porcelain exports/community-season-snapshots)" ]; then
            echo "No snapshot changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add exports/community-season-snapshots
          git commit -m "Add community season snapshot"
          git push
